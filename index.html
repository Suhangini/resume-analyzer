<!DOCTYPE html>
<html>
<head>
    <title>AI Resume Analyzer</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #667eea, #764ba2);
            margin: 0;
            padding: 0;
            color: white;
        }

        .container {
            width: 400px;
            margin: 80px auto;
            background: rgba(0,0,0,0.4);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0px 0px 20px rgba(0,0,0,0.3);
            text-align: center;
        }

        h1 {
            margin-bottom: 20px;
        }

        /* 🔥 FILE UPLOAD DESIGN */
        .file-upload {
            display: flex;
            align-items: center;
            background: white;
            padding: 10px;
            border-radius: 6px;
            color: black;
            margin: 15px 0;
        }

        .file-upload input[type="file"] {
            display: none;
        }

        #file-name {
            flex: 1;
            text-align: left;
            font-size: 14px;
            padding-left: 10px;
        }

        .file-label {
            background: #00c9a7;
            color: white;
            padding: 8px 12px;
            border-radius: 5px;
            cursor: pointer;
            margin-left: 10px;
        }

        .file-label:hover {
            background: #00a98f;
        }

        button {
            padding: 10px 20px;
            border: none;
            background: #00c9a7;
            color: white;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
        }

        button:hover {
            background: #00a98f;
        }

        .result {
            margin-top: 20px;
            text-align: left;
        }

        ul {
            padding-left: 20px;
        }

        .score {
            font-size: 22px;
            font-weight: bold;
            color: #ffd700;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🧠 AI Resume Analyzer</h1>

        <form method="POST" enctype="multipart/form-data">

            <!-- ✅ FINAL FILE INPUT -->
            <div class="file-upload">
                <input type="file" name="resume" id="fileInput" required>
                <span id="file-name">No file chosen</span>
                <label for="fileInput" class="file-label">📁 Choose Resume</label>
            </div>

            <button type="submit">Analyze Resume</button>
        </form>

        {% if score is not none %}
        <div class="result">
            <p class="score">📊 Score: {{score}} / 100</p>

            <h3>✅ Skills Found:</h3>
            <ul>
                {% for skill in skills %}
                    <li>{{skill}}</li>
                {% endfor %}
            </ul>
        </div>
        {% endif %}
    </div>

    <!-- ✅ JS FOR FILE NAME -->
    <script>
        document.getElementById("fileInput").addEventListener("change", function() {
            const fileName = this.files[0]?.name || "No file chosen";
            document.getElementById("file-name").textContent = fileName;
        });
    </script>

</body>
</html>
